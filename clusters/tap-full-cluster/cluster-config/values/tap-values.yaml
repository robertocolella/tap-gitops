tap_install:
  values:
    shared:
      ingress_domain: tap.robertocolella.com
      image_registry:
        project_path: harbor.dorn.tkg-azure-lab.robertocolella.com/tap
    ceip_policy_disclosed: true
    profile: full
    supply_chain: testing_scanning
    ootb_supply_chain_basic:
      registry:
        server: harbor.dorn.tkg-azure-lab.robertocolella.com
        repository: tap/supplychain
      gitops:
        ssh_secret: ""
    ootb_supply_chain_testing:
      registry:
        server: harbor.dorn.tkg-azure-lab.robertocolella.com
        repository: tap/supplychain
      gitops:
        ssh_secret: ""
    ootb_supply_chain_testing_scanning:
      registry:
        server: harbor.dorn.tkg-azure-lab.robertocolella.com
        repository: tap/supplychain
      gitops:
        ssh_secret: ""
    contour:
      envoy:
        service:
          type: LoadBalancer
    buildservice:
      kp_default_repository: harbor.dorn.tkg-azure-lab.robertocolella.com/tap/build-service
      kp_default_repository_username: admin
    tap_gui:
      service_type: ClusterIP
      metadataStoreAutoconfiguration: true
      ingressEnabled: "true"
      app_config:
        customize:
          # custom_logo:
          custom_name: 'Roberto Colella - Tanzu Application Platform'
        app:
          title: 'Roberto Colella - Developer Portal'
          support:
            url: https://tanzu.vmware.com/support
            items:
              - title: Contact Support
                icon: email
                links:
                - url: https://tanzu.vmware.com/support
                  title: Tanzu Support Page
              - title: Documentation
                icon: docs
                links:
                - url: https://docs.vmware.com/en/VMware-Tanzu-Application-Platform/index.html
                  title: Tanzu Application Platform Documentation
        integrations:
          github:
          - host: github.com
        # techdocs:
        #   generator:
        #     dockerImage: spotify/techdocs:v1.1.2
        #     pullImage: false
        #     runIn: "docker"        
        catalog:
          locations:
          - type: url
            target: https://github.com/MoSehsah/bank-demo/blob/main/catalog/catalog-info.yaml
    cnrs:
      domain_template: '{{.Name}}-{{.Namespace}}.{{.Domain}}'
    metadata_store:
      ns_for_export_app_cert: '*'
      app_service_type: ClusterIP
    scanning:
      metadataStore:
        url: ""
    grype:
      namespace: my-apps
      targetImagePullSecret: tap-registry
    policy:
      tuf_enabled: false
    tap_telemetry:
      installed_for_vmware_internal_use: "true"

    appliveview_connector:
      activateSensitiveOperations: true  